<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting to app...</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // See https://github.com/rafgraph/spa-github-pages
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, -1 * segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/') + '&search=' + l.search
      );
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
